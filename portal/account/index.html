<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Account Settings — Wound Guard</title>

  <!-- Auth0 SDK (must load before auth.js) -->
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="../css/template.css" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Krona+One&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Account Settings page styles ── */

    :root {
      --bg:            #FFFEFA;
      --accent:        #d2fcd8;
      --accent-dark:   #61ce70;
      --brand:         #2eb135;
      --text:          #061728;
      --text-muted:    #4a6074;
      --text-light:    #8fa4b4;
      --white:         #ffffff;
      --border:        rgba(6,23,40,0.09);
      --radius-card:   16px;
      --shadow-card:   0 2px 12px rgba(6,23,40,0.07);
      --shadow-hover:  0 6px 24px rgba(6,23,40,0.12);
    }

    .acct-content {
      padding: 40px 40px 60px;
      max-width: 900px;
    }

    /* ── Hero / Title ── */
    .acct-hero {
      margin-bottom: 36px;
    }

    .acct-hero-eyebrow {
      font-family: 'Sora', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--brand);
      margin-bottom: 8px;
    }

    .acct-hero-title {
      font-family: 'Krona One', sans-serif;
      font-size: 1.75rem;
      font-weight: 400;
      color: var(--text);
      line-height: 1.2;
      margin: 0;
    }

    .acct-hero-title .separator {
      color: var(--text-light);
      margin: 0 10px;
      font-weight: 300;
      font-family: 'Sora', sans-serif;
    }

    .acct-hero-title .user-name {
      color: var(--brand);
    }

    /* Loading skeleton */
    .name-skeleton {
      display: inline-block;
      background: linear-gradient(90deg, var(--accent) 0%, #e8fff0 50%, var(--accent) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite;
      border-radius: 6px;
      height: 1em;
      vertical-align: middle;
    }
    .name-skeleton.user { width: 160px; }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Two-column layout ── */
    .acct-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 620px) {
      .acct-columns  { grid-template-columns: 1fr; }
      .acct-content  { padding: 24px 20px 48px; }
    }

    /* ── Card shared styles ── */
    .acct-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-card);
      padding: 24px 26px;
      box-shadow: var(--shadow-card);
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .acct-card-title {
      font-family: 'Sora', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Field rows ── */
    .field-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 0;
      border-bottom: 1px solid rgba(6,23,40,0.05);
      gap: 12px;
      min-height: 42px;
    }

    .field-row:last-child {
      border-bottom: none;
    }

    /* VIEW mode */
    .field-view {
      flex: 1;
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
    }

    .field-label {
      font-family: 'Sora', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .field-value {
      font-family: 'Sora', sans-serif;
      font-size: 0.88rem;
      color: var(--text);
      font-weight: 400;
    }

    /* Read-only value (no edit button) */
    .field-value-readonly {
      font-family: 'Sora', sans-serif;
      font-size: 0.88rem;
      color: var(--text);
      font-weight: 400;
    }

    /* Edit button */
    .field-edit-btn {
      font-family: 'Sora', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      background: var(--accent);
      color: var(--brand);
      border: none;
      cursor: pointer;
      padding: 3px 12px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s ease, color 0.15s ease;
      line-height: 1.8;
    }
    .field-edit-btn:hover { background: var(--accent-dark); color: var(--white); }

    /* EDIT mode */
    .field-edit-wrap {
      display: none;
      flex: 1;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .field-row.is-editing .field-view      { display: none; }
    .field-row.is-editing .field-edit-btn  { display: none; }
    .field-row.is-editing .field-edit-wrap { display: flex; }

    .field-input {
      font-family: 'Sora', sans-serif;
      font-size: 0.88rem;
      color: var(--text);
      background: var(--bg);
      border: 1.5px solid rgba(6,23,40,0.14);
      border-radius: 8px;
      padding: 6px 10px;
      outline: none;
      flex: 1;
      min-width: 120px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      box-sizing: border-box;
    }

    .field-input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(46,177,53,0.1);
    }

    .field-save-btn, .field-cancel-btn {
      font-family: 'Sora', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      padding: 4px 12px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s ease, color 0.15s ease, opacity 0.15s ease;
      line-height: 1.8;
    }

    .field-save-btn {
      background: var(--brand);
      color: var(--white);
    }
    .field-save-btn:hover    { background: #249e2a; }
    .field-save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .field-cancel-btn {
      background: transparent;
      color: var(--text-light);
    }
    .field-cancel-btn:hover { background: rgba(6,23,40,0.06); color: var(--text); }

    /* Inline saving indicator */
    .field-saving {
      display: none;
      align-items: center;
      gap: 5px;
      font-family: 'Sora', sans-serif;
      font-size: 0.75rem;
      color: var(--brand);
    }
    .field-saving.visible { display: flex; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .field-saving svg {
      animation: spin 0.8s linear infinite;
      width: 13px; height: 13px;
      stroke: var(--brand); fill: none;
      stroke-width: 2.5; stroke-linecap: round;
    }

    /* ── Read-only info card (right column) ── */
    .acct-card.readonly .field-row {
      justify-content: flex-start;
      gap: 6px;
    }

    /* ── Toast ── */
    .save-toast {
      position: fixed;
      bottom: 80px;
      left: calc(50% + (var(--sidebar-width, 190px) / 2));
      transform: translateX(-50%) translateY(12px);
      background: var(--text);
      color: var(--white);
      font-family: 'Sora', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 999px;
      box-shadow: 0 4px 20px rgba(6,23,40,0.22);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 9999;
      white-space: nowrap;
    }
    .save-toast.success { background: var(--brand); }
    .save-toast.error   { background: #d94040; }
    .save-toast.show    { opacity: 1; transform: translateX(-50%) translateY(0); }

    .back-btn {
      display: inline-flex;
     align-items: center;
     gap: 6px;
      font-family: 'Sora', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 4px;
      border-radius: 8px;
      margin-bottom: 20px;
      transition: color 0.15s ease, background 0.15s ease;
    }
    
    .back-btn:hover {
      color: var(--brand);
      background: var(--accent);
      padding: 6px 10px;
    }

  </style>
</head>
<body>

  <!-- MAIN CONTENT -->
  <main class="portal-content" id="portal-content">
    <div class="page-slot">

       <button onclick="goBack()" class="back-btn" aria-label="Go back">

   </button>

      <div class="acct-content">

        <!-- ── Hero / Title ── -->
        <div class="acct-hero">

          <h1 class="acct-hero-title" id="acct-hero-title" aria-live="polite">
            Account Settings
            <span class="separator">-</span>
            <!--
              Skeleton shown while AWS loads.
              Replaced by renderAccountTitle() once data arrives.
            -->
            <span class="name-skeleton user" aria-hidden="true"></span>
          </h1>
        </div>

        <!-- ── Two-column layout ── -->
        <div class="acct-columns">

          <!-- LEFT — Editable fields -->
          <div class="acct-card" id="acct-editable-card">
            <div class="acct-card-title">Account Details</div>

            <!-- Username — read-only (managed via secure login software) -->
            <div class="field-row" id="row-username">
              <div class="field-view">
                <span class="field-label">Username:</span>
                <span class="field-value" id="val-username"></span>
              </div>
            </div>

            <!-- Account Owner -->
            <div class="field-row" id="row-owner">
              <div class="field-view">
                <span class="field-label">Account Owner:</span>
                <span class="field-value" id="val-owner"></span>
              </div>
              <button class="field-edit-btn" onclick="startFieldEdit('owner')" aria-label="Edit account owner">Edit</button>
              <div class="field-edit-wrap" id="edit-owner">
                <input class="field-input" id="input-owner" type="text" placeholder="First Last" autocomplete="name" />
                <button class="field-save-btn"   onclick="saveField('owner')" aria-label="Save owner">Save</button>
                <button class="field-cancel-btn" onclick="cancelFieldEdit('owner')" aria-label="Cancel">Cancel</button>
                <span class="field-saving" id="saving-owner">
                  <svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>

                </span>
              </div>
            </div>

            <!-- Contact Phone -->
            <div class="field-row" id="row-phone">
              <div class="field-view">
                <span class="field-label">Contact Phone:</span>
                <span class="field-value" id="val-phone"></span>
              </div>
              <button class="field-edit-btn" onclick="startFieldEdit('phone')" aria-label="Edit phone">Edit</button>
              <div class="field-edit-wrap" id="edit-phone">
                <input class="field-input" id="input-phone" type="tel" placeholder="###-###-####" autocomplete="tel" />
                <button class="field-save-btn"   onclick="saveField('phone')" aria-label="Save phone">Save</button>
                <button class="field-cancel-btn" onclick="cancelFieldEdit('phone')" aria-label="Cancel">Cancel</button>
                <span class="field-saving" id="saving-phone">
                  <svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>

                <span class="field-value" id="val-email"></span>

<!-- ═══════════════════════════════════════
     SCRIPTS
     ═══════════════════════════════════════ -->
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/template.js"></script>

<script>
  // ── Copyright year ──────────────────────────────────────────────────────────
  document.getElementById('footer-year').textContent = new Date().getFullYear();

  // ── Required portal bootstrap ───────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', async () => {
    initPortalPage();
    await loadAccountData();
  });


  // ════════════════════════════════════════════════════════════════════════════
  //  loadAccountData — fetches account details from AWS
  //
  //  TO CONNECT AWS (READ):
  //  Replace the placeholder Promise.resolve({...}) with a real fetch:
  //
  //    const token = await getAccessToken();           // from auth.js
  //    const res   = await fetch(
  //      'https://YOUR_API.execute-api.us-east-1.amazonaws.com/prod/account',
  //      { headers: { Authorization: `Bearer ${token}` } }
  //    );
  //    if (!res.ok) throw new Error('API error ' + res.status);
  //    return await res.json();
  //    // Expected shape:
  //    //   { userName, username, ownerName, phone, email, createdDate, orgName, accessLevel }
  // ════════════════════════════════════════════════════════════════════════════
  async function loadAccountData() {
    try {
      // ── PLACEHOLDER — remove when AWS is connected ───────────────────────
      const data = await Promise.resolve({
        userName:    "User's Name",
        username:    'jsmith',
        ownerName:   'John Smith',
        phone:       '321-555-0100',
        email:       'jsmith@example.com',
        createdDate: 'mm/dd/yy',
        orgName:     'Sunshine Wound Care',
        accessLevel: 'Contributor',
      });
      // ─────────────────────────────────────────────────────────────────────

      renderAccountTitle(data.userName);

      // Editable fields — phone is always displayed dash-formatted
      document.getElementById('val-username').textContent = data.username;
      document.getElementById('val-owner').textContent    = data.ownerName;
      document.getElementById('val-phone').textContent    = formatPhone(data.phone);
      document.getElementById('val-email').textContent    = data.email;

      // Read-only fields
      document.getElementById('val-created').textContent     = data.createdDate;
      document.getElementById('val-org').textContent         = data.orgName;
      document.getElementById('val-access-level').textContent = data.accessLevel || '—';

    } catch (err) {
      console.error('Failed to load account data:', err);
      renderAccountTitle("User's Name");
    }
  }

  function renderAccountTitle(userName) {
    document.getElementById('acct-hero-title').innerHTML =
      `Account Settings <span class="separator">-</span> <span class="user-name">${escHtml(userName)}</span>`;
  }


  // ════════════════════════════════════════════════════════════════════════════
  //  Inline field edit — per-field save to AWS
  // ════════════════════════════════════════════════════════════════════════════

  // Config for each editable field
  // ════════════════════════════════════════════════════════════════════════════
  //  TO CONNECT AWS (SAVE):
  //  In each field's saveToAws(value), replace the placeholder setTimeout with:
  //
  //    const token = await getAccessToken();
  //    const res   = await fetch(
  //      'https://YOUR_API.execute-api.us-east-1.amazonaws.com/prod/account',
  //      {
  //        method:  'PATCH',
  //        headers: { 'Content-Type': 'application/json',
  //                   Authorization: `Bearer ${token}` },
  //        body:    JSON.stringify({ fieldKey: value }),
  //        // fieldKey matches the property name in your DynamoDB item, e.g.:
  //        //   username, ownerName, phone, email
  //      }
  //    );
  //    if (!res.ok) throw new Error('Save failed: ' + res.status);
  // ════════════════════════════════════════════════════════════════════════════
  const FIELD_CONFIG = {
    owner: {
      validate: v => v.trim().includes(' ') || 'Please enter a first and last name.',
      async saveToAws(value) {
        await new Promise(r => setTimeout(r, 800));
        console.log('[Account] Save owner:', value);
      }
    },
    phone: {
      // Strips all non-digits, requires exactly 10, then formats as ###-###-####
      validate(v) {
        const digits = v.replace(/\D/g, '');
        if (digits.length !== 10) return 'Phone number must contain exactly 10 digits.';
        return true;
      },
      format(v) {
        const d = v.replace(/\D/g, '');
        return `${d.slice(0,3)}-${d.slice(3,6)}-${d.slice(6,10)}`;
      },
      async saveToAws(value) {
        await new Promise(r => setTimeout(r, 800));
        console.log('[Account] Save phone:', value);
      }
    },
  };

  // ── Enter edit mode ─────────────────────────────────────────────────────────
  function startFieldEdit(field) {
    const row   = document.getElementById('row-' + field);
    const input = document.getElementById('input-' + field);

    // Pre-fill input with current displayed value
    input.value = document.getElementById('val-' + field).textContent;

    row.classList.add('is-editing');
    input.focus();
    input.select();
  }

  // ── Cancel edit ─────────────────────────────────────────────────────────────
  function cancelFieldEdit(field) {
    document.getElementById('row-' + field).classList.remove('is-editing');
    document.getElementById('saving-' + field).classList.remove('visible');
    const saveBtn = document.getElementById('input-' + field)
      .closest('.field-edit-wrap')
      .querySelector('.field-save-btn');
    saveBtn.disabled = false;
  }

  // ── Save field to AWS ───────────────────────────────────────────────────────
  async function saveField(field) {
    const cfg     = FIELD_CONFIG[field];
    const input   = document.getElementById('input-' + field);
    const saving  = document.getElementById('saving-' + field);
    const saveBtn = input.closest('.field-edit-wrap').querySelector('.field-save-btn');
    const value   = input.value.trim();

    // Validation
    if (!value) {
      input.focus();
      showToast('This field cannot be empty.', 'error');
      return;
    }
    const validResult = cfg.validate(value);
    if (validResult !== true) {
      input.focus();
      showToast(validResult, 'error');
      return;
    }

    // Disable controls + show spinner
    saveBtn.disabled = true;
    saving.classList.add('visible');

    try {
      await cfg.saveToAws(value);

      // Update display — apply formatter if the field has one (e.g. phone → ###-###-####)
      const displayValue = cfg.format ? cfg.format(value) : value;
      document.getElementById('val-' + field).textContent = displayValue;
      cancelFieldEdit(field);
      showToast('Saved successfully!', 'success');

    } catch (err) {
      console.error('Save failed:', err);
      showToast('Save failed. Please try again.', 'error');
    } finally {
      saveBtn.disabled = false;
      saving.classList.remove('visible');
    }
  }

  // ── Enter key triggers save ─────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const target = e.target;
    if (!target.classList.contains('field-input')) return;
    const row   = target.closest('.field-row');
    const field = row.id.replace('row-', '');
    saveField(field);
  });

  // ── Escape key cancels ──────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key !== 'Escape') return;
    const target = e.target;
    if (!target.classList.contains('field-input')) return;
    const row   = target.closest('.field-row');
    const field = row.id.replace('row-', '');
    cancelFieldEdit(field);
  });

  // ── Toast ───────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(message, type = 'success') {
    const el = document.getElementById('save-toast');
    el.textContent = message;
    el.className   = 'save-toast ' + type;
    void el.offsetWidth;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
  }

  // ── Utility ─────────────────────────────────────────────────────────────────
  // Normalises any 10-digit phone string to ###-###-####
  function formatPhone(v) {
    const d = String(v).replace(/\D/g, '');
    if (d.length !== 10) return v;   // return as-is if not 10 digits
    return `${d.slice(0,3)}-${d.slice(3,6)}-${d.slice(6,10)}`;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function goBack() {
  if (window.history.length > 1) {
    window.history.back();
  } else {
    window.location.href = '/guard/portal/home/';
  }
  }

</script>

</body>
</html>
