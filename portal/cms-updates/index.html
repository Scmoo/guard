<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!--
    ╔══════════════════════════════════════════════════╗
    ║  WOUND GUARD — Portal Page Template              ║
    ║                                                  ║
    ║  HOW TO CREATE A NEW PAGE:                       ║
    ║  1. Copy this entire folder (css + js + this     ║
    ║     file) into a new subfolder, e.g. portal/orders/ ║
    ║  2. Rename this file to index.html               ║
    ║  3. Change the <title> tag below                 ║
    ║  4. Add class="active" to the correct sidebar    ║
    ║     nav item (match data-page to your folder)    ║
    ║  5. Put your page content inside .page-slot      ║
    ║  That's it!                                      ║
    ╚══════════════════════════════════════════════════╝
  -->

  <!-- ↓ Change this for each page ↓ -->
  <title>Medicare Reimbursement Updates — Wound Guard</title>

  <!-- Auth0 SDK (must load before auth.js) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="../../css/portal.css" />
</head>
<body>

<!-- ═══════════════════════════════════════
     HEADER
     ═══════════════════════════════════════ -->
<header class="portal-header" role="banner">

  <!-- Logo — links back to home -->
  <a href="/guard/portal/home/" class="header-logo" aria-label="Wound Guard Home">
    <div class="header-logo-mark">
      <!--
        Replace the SVG below with your real logo:
        <img src="/guard/images/logo.svg" alt="Wound Guard" width="22" height="22" />
      -->
      <svg viewBox="0 0 24 24">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
    </div>
    <div class="header-logo-text">Wound<br>Guard</div>
  </a>

  <!-- Right side: buttons + icons -->
  <div class="header-actions" role="navigation" aria-label="Header actions">

    <!-- New Order button -->
    <a href="/guard/portal/new-order/" class="header-btn header-btn-primary" aria-label="Place a new order">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      New Order
    </a>

    <!-- Organization button — name filled in by template.js -->
    <a href="/guard/portal/organization/" class="header-btn header-btn-secondary" aria-label="View organization">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M9 21V9h6v12"/>
        <path d="M9 12h6"/>
      </svg>
      <span id="header-org-name">Organization</span>
    </a>

    <!-- Divider line -->
    <div class="header-divider" aria-hidden="true"></div>

    <!-- Settings icon -->
    <a href="/guard/portal/account/" class="header-icon-btn" aria-label="Account Settings">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </a>

    <!-- Notifications icon -->
    <a href="/guard/portal/notifications/" class="header-icon-btn" aria-label="Notifications">
      <svg viewBox="0 0 24 24">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <!-- Green dot — shown when unread notifications exist -->
      <span class="notif-badge" id="notif-badge" aria-label="Unread notifications" style="display:none"></span>
    </a>

  </div>
</header>


<!-- ═══════════════════════════════════════
     BODY — Sidebar + Content
     ═══════════════════════════════════════ -->
<div class="portal-body">

  <!-- SIDEBAR -->
  <nav class="portal-sidebar" id="portal-sidebar" aria-label="Main navigation">

    <!-- Collapse / expand toggle -->
    <div class="sidebar-toggle-row">
      <button
        class="sidebar-toggle-btn"
        onclick="toggleSidebar()"
        aria-label="Toggle sidebar"
        title="Collapse / expand"
      >
        <svg viewBox="0 0 24 24">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
    </div>

    <!-- Nav links -->
    <div class="sidebar-nav" role="list">

      <!--
        data-page  = the folder name for this page (no slashes)
                     template.js uses this to highlight the active item
        data-label = tooltip shown when sidebar is collapsed
        class="active" — add this to whichever item is the CURRENT page
      -->

      <!-- Home -->
      <a
        href="/guard/portal/home/"
        class="sidebar-nav-item active"
        data-page="home"
        data-label="Home"
        role="listitem"
        aria-label="Home"
      >
        <span class="sidebar-nav-icon">
          <svg viewBox="0 0 24 24">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </span>
        <span class="sidebar-nav-label">Home</span>
      </a>

      <!-- Orders -->
      <a
        href="/guard/portal/orders/"
        class="sidebar-nav-item"
        data-page="orders"
        data-label="Orders"
        role="listitem"
        aria-label="Orders"
      >
        <span class="sidebar-nav-icon">
          <svg viewBox="0 0 24 24">
            <line x1="8"  y1="6"  x2="21" y2="6"/>
            <line x1="8"  y1="12" x2="21" y2="12"/>
            <line x1="8"  y1="18" x2="21" y2="18"/>
            <line x1="3"  y1="6"  x2="3.01" y2="6"/>
            <line x1="3"  y1="12" x2="3.01" y2="12"/>
            <line x1="3"  y1="18" x2="3.01" y2="18"/>
          </svg>
        </span>
        <span class="sidebar-nav-label">Orders</span>
      </a>

      <!--
        ── ADD MORE NAV ITEMS HERE ──────────────────
        Copy a block above and change:
          href       → /guard/portal/PAGENAME/
          data-page  → PAGENAME  (must match folder name)
          data-label → Display name for collapsed tooltip
          aria-label → Same as data-label
          SVG icon   → Pick one from https://lucide.dev
          label text → What shows in the sidebar
        ────────────────────────────────────────────
      -->

    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="portal-content" id="portal-content">

    <!--
      ╔══════════════════════════════════════════╗
      ║  YOUR PAGE CONTENT GOES HERE             ║
      ║                                          ║
      ║  Everything inside .page-slot is unique  ║
      ║  to this page. Header, sidebar, and      ║
      ║  footer are automatic.                   ║
      ╚══════════════════════════════════════════╝
    -->
    <div class="page-slot">

      <!-- ══════════════════════════════════════
           MEDICARE REIMBURSEMENT UPDATES PAGE
           ══════════════════════════════════════ -->

      <button onclick="goBack()" class="back-btn" aria-label="Go back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back
      </button>

      <style>
        /* ── Google Fonts ── */
        @import url('https://fonts.googleapis.com/css2?family=Krona+One&family=Sora:wght@300;400;500;600;700&display=swap');

        /* ── Back button ── */
        .back-btn {
          display: inline-flex;
          align-items: center;
          gap: 6px;
          font-family: 'Sora', sans-serif;
          font-size: 0.85rem;
          font-weight: 600;
          color: #4a6074;
          background: none;
          border: none;
          cursor: pointer;
          padding: 6px 4px;
          border-radius: 8px;
          margin-bottom: 20px;
          transition: color 0.15s ease, background 0.15s ease;
        }
        .back-btn:hover {
          color: #2eb135;
          background: #d2fcd8;
          padding: 6px 10px;
        }

        /* ── Page variables ── */
        .notif-page {
          --bg:        #FFFEFA;
          --accent:    #d2fcd8;
          --mid:       #61ce70;
          --dark:      #2eb135;
          --text:      #061728;
          --muted:     #6b7a8a;
          --border:    #daf5dc;
          --radius:    12px;
          font-family: 'Sora', sans-serif;
          color: var(--text);
          max-width: 860px;
          margin: 0 auto;
          padding: 48px 32px 64px;
        }

        /* ── Page heading ── */
        .notif-page__eyebrow {
          font-family: 'Sora', sans-serif;
          font-size: 0.7rem;
          font-weight: 600;
          letter-spacing: 0.12em;
          text-transform: uppercase;
          color: var(--dark);
          margin: 0 0 8px;
        }
        .notif-page__title {
          font-family: 'Krona One', sans-serif;
          font-size: clamp(1.5rem, 3vw, 2.1rem);
          color: var(--dark);
          line-height: 1.2;
          margin: 0 0 6px;
        }
        .notif-page__subtitle {
          font-size: 0.9rem;
          color: var(--muted);
          margin: 0 0 36px;
        }

        /* ── Filter / count bar ── */
        .notif-bar {
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: 20px;
          flex-wrap: wrap;
          gap: 12px;
        }
        .notif-bar__count {
          font-size: 0.82rem;
          color: var(--muted);
          margin: 0;
        }
        .notif-bar__count strong {
          color: var(--text);
          font-weight: 600;
        }
        .notif-bar__filters {
          display: flex;
          gap: 8px;
        }
        .notif-filter-btn {
          font-family: 'Sora', sans-serif;
          font-size: 0.78rem;
          font-weight: 500;
          padding: 5px 14px;
          border-radius: 20px;
          border: 1.5px solid var(--border);
          background: transparent;
          color: var(--muted);
          cursor: pointer;
          transition: all 0.18s ease;
        }
        .notif-filter-btn:hover,
        .notif-filter-btn.active {
          background: var(--accent);
          border-color: var(--mid);
          color: var(--dark);
        }

        /* ── Section label ── */
        .notif-section-label {
          font-size: 0.72rem;
          font-weight: 600;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          color: var(--muted);
          margin: 28px 0 10px;
          padding-left: 4px;
        }

        /* ── Update item (accordion row) ── */
        .notif-list {
          display: flex;
          flex-direction: column;
          gap: 10px;
        }
        .notif-item {
          border: 1.5px solid var(--border);
          border-radius: var(--radius);
          background: #fff;
          overflow: hidden;
          transition: border-color 0.2s, box-shadow 0.2s;
        }
        .notif-item:hover {
          border-color: var(--mid);
          box-shadow: 0 2px 12px rgba(46,177,53,0.08);
        }
        .notif-item.is-unread {
          border-left: 4px solid var(--dark);
        }
        .notif-item.is-open {
          border-color: var(--mid);
          box-shadow: 0 4px 20px rgba(46,177,53,0.10);
        }

        /* ── Row (clickable header) ── */
        .notif-item__row {
          display: flex;
          align-items: center;
          gap: 18px;
          padding: 16px 20px;
          cursor: pointer;
          user-select: none;
          -webkit-user-select: none;
        }

        /* Date badge */
        .notif-item__date {
          flex: 0 0 68px;
          text-align: center;
          background: var(--accent);
          border-radius: 8px;
          padding: 8px 4px;
          line-height: 1;
        }
        .notif-item__date-month {
          display: block;
          font-size: 0.6rem;
          font-weight: 600;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          color: var(--dark);
        }
        .notif-item__date-day {
          display: block;
          font-size: 1.35rem;
          font-weight: 700;
          color: var(--dark);
          font-family: 'Krona One', sans-serif;
          margin: 2px 0 1px;
        }
        .notif-item__date-year {
          display: block;
          font-size: 0.58rem;
          color: var(--muted);
          font-weight: 500;
        }

        /* Tag pill */
        .notif-item__tag {
          flex: 0 0 auto;
          font-size: 0.66rem;
          font-weight: 600;
          letter-spacing: 0.07em;
          text-transform: uppercase;
          padding: 3px 10px;
          border-radius: 20px;
          background: var(--accent);
          color: var(--dark);
          white-space: nowrap;
        }
        .notif-item__tag--alert {
          background: #fff3cd;
          color: #8a6200;
        }
        .notif-item__tag--new {
          background: #d2fcd8;
          color: #2eb135;
        }

        /* Title + preview */
        .notif-item__meta {
          flex: 1;
          min-width: 0;
        }
        .notif-item__title {
          font-size: 0.93rem;
          font-weight: 600;
          color: var(--text);
          margin: 0 0 3px;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }
        .notif-item.is-open .notif-item__title {
          white-space: normal;
        }
        .notif-item__preview {
          font-size: 0.79rem;
          color: var(--muted);
          margin: 0;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }
        .notif-item.is-open .notif-item__preview {
          display: none;
        }

        /* Unread dot */
        .notif-item__dot {
          width: 8px;
          height: 8px;
          border-radius: 50%;
          background: var(--dark);
          flex: 0 0 8px;
          opacity: 0;
          transition: opacity 0.2s;
        }
        .notif-item.is-unread .notif-item__dot {
          opacity: 1;
        }

        /* Chevron */
        .notif-item__chevron {
          flex: 0 0 20px;
          color: var(--muted);
          transition: transform 0.25s ease;
          display: flex;
          align-items: center;
        }
        .notif-item.is-open .notif-item__chevron {
          transform: rotate(180deg);
          color: var(--dark);
        }

        /* ── Expandable body ── */
        .notif-item__body {
          display: none;
          border-top: 1.5px solid var(--border);
          padding: 20px 24px 24px;
          animation: notifSlideDown 0.22s ease;
        }
        .notif-item.is-open .notif-item__body {
          display: block;
        }
        @keyframes notifSlideDown {
          from { opacity: 0; transform: translateY(-6px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        .notif-item__body-header {
          display: flex;
          align-items: flex-start;
          justify-content: space-between;
          gap: 16px;
          margin-bottom: 14px;
        }
        .notif-item__body-title {
          font-family: 'Sora', sans-serif;
          font-size: 1rem;
          font-weight: 700;
          color: var(--text);
          margin: 0;
          line-height: 1.35;
        }
        .notif-item__mark-read {
          font-family: 'Sora', sans-serif;
          font-size: 0.74rem;
          font-weight: 500;
          color: var(--dark);
          background: none;
          border: 1.5px solid var(--mid);
          border-radius: 20px;
          padding: 4px 12px;
          cursor: pointer;
          white-space: nowrap;
          transition: background 0.15s;
          flex-shrink: 0;
        }
        .notif-item__mark-read:hover {
          background: var(--accent);
        }
        .notif-item__mark-read.done {
          color: var(--muted);
          border-color: var(--border);
          pointer-events: none;
        }

        .notif-item__body-content {
          font-size: 0.88rem;
          line-height: 1.75;
          color: var(--text);
          margin: 0 0 16px;
        }
        .notif-item__body-content p {
          margin: 0 0 10px;
        }
        .notif-item__body-content p:last-child {
          margin-bottom: 0;
        }

        .notif-item__body-footer {
          display: flex;
          align-items: center;
          gap: 12px;
          flex-wrap: wrap;
          padding-top: 14px;
          border-top: 1px solid var(--border);
        }
        .notif-item__source {
          font-size: 0.74rem;
          color: var(--muted);
        }
        .notif-item__source a {
          color: var(--dark);
          text-decoration: none;
          font-weight: 500;
        }
        .notif-item__source a:hover {
          text-decoration: underline;
        }
        .notif-footer-spacer { flex: 1; }
        .notif-item__effective {
          font-size: 0.73rem;
          color: var(--muted);
          display: flex;
          align-items: center;
          gap: 5px;
        }
        .notif-item__effective svg { color: var(--dark); }
      </style>

      <div class="notif-page">

        <!-- Heading -->
        <p class="notif-page__eyebrow">Reimbursements</p>
        <h1 class="notif-page__title">Medicare Reimbursement Updates</h1>
        <p class="notif-page__subtitle">Stay current on billing changes, policy updates, and coverage adjustments affecting your wound care orders.</p>

        <!-- Filter bar -->
        <div class="notif-bar">
          <p class="notif-bar__count">
            <strong id="notif-count">6</strong> updates &mdash;
            <span id="notif-unread-count">2 unread</span>
          </p>
          <div class="notif-bar__filters">
            <button class="notif-filter-btn active" onclick="filterNotifs('all', this)">All</button>
            <button class="notif-filter-btn" onclick="filterNotifs('unread', this)">Unread</button>
            <button class="notif-filter-btn" onclick="filterNotifs('alert', this)">Alerts</button>
          </div>
        </div>

        <!-- Unread section -->
        <div id="section-unread">
          <p class="notif-section-label">Unread</p>
          <div class="notif-list" id="list-unread"></div>
        </div>

        <!-- Earlier section -->
        <div id="section-earlier">
          <p class="notif-section-label">Earlier</p>
          <div class="notif-list" id="list-earlier"></div>
        </div>

      </div>

      <script>
        // ─────────────────────────────────────────────
        //  UPDATES DATA ARRAY
        //  To post a new update: add a new object at
        //  the top of this array and set unread: true.
        // ─────────────────────────────────────────────
        const UPDATES = [
          {
            id: 'u1',
            date: '2026-03-18',
            tag: 'alert',
            title: 'Cellular & Tissue-Based Products (CTPs): New Prior Authorization Required',
            preview: 'CMS has added prior authorization requirements for several high-cost CTPs effective April 1.',
            content: `
              <p>Effective <strong>April 1, 2026</strong>, CMS will require prior authorization for certain Cellular and Tissue-Based Products (CTPs) billed under HCPCS codes Q4100–Q4291 when used in the outpatient hospital setting.</p>
              <p>Providers must submit a prior authorization request through the Medicare Administrative Contractor (MAC) before furnishing the item. Requests must include clinical documentation of wound size, chronicity, and prior treatment history.</p>
              <p>Orders submitted after April 1 without prior authorization will be subject to claim denial. Please update your ordering workflows accordingly and contact your billing team to ensure compliance.</p>
            `,
            source: { label: 'CMS MLN Matters Article MM13105', url: 'https://www.cms.gov' },
            effective: 'April 1, 2026',
            unread: true,
          },
          {
            id: 'u2',
            date: '2026-03-10',
            tag: 'new',
            title: 'Q1 2026 DMEPOS Fee Schedule Update — Wound Care Supplies',
            preview: 'Reimbursement rates for surgical dressings and advanced wound care products have been revised.',
            content: `
              <p>CMS has published the Q1 2026 DMEPOS fee schedule update. The following wound care supply categories have revised payment rates:</p>
              <p><strong>Surgical Dressings (A6000–A6550):</strong> Average rate decrease of 1.2% reflecting the annual inflation adjustment. Individual HCPCS codes vary — review the full schedule for your most-used codes.</p>
              <p><strong>Negative Pressure Wound Therapy (E2402):</strong> No change to base rental rate; accessories updated per CPI adjustment.</p>
              <p>Wound Guard has updated all product pricing in the ordering portal to reflect these rates. No action is required on your end — new orders will automatically apply Q1 2026 rates.</p>
            `,
            source: { label: 'CMS DMEPOS Fee Schedule 2026 Q1', url: 'https://www.cms.gov' },
            effective: 'January 1, 2026',
            unread: true,
          },
          {
            id: 'u3',
            date: '2026-02-21',
            tag: 'update',
            title: 'LCD Update: Surgical Dressings (L33831) — Documentation Clarification',
            preview: 'Noridian has revised documentation requirements for surgical dressing reimbursement.',
            content: `
              <p>Noridian Healthcare Solutions has issued a revised Local Coverage Determination (LCD) for Surgical Dressings (L33831), effective <strong>March 15, 2026</strong>.</p>
              <p>Key documentation changes include: wound dimensions must now be recorded at each dressing change visit, and the treating clinician must document medical necessity for secondary dressings when used in combination with a primary dressing.</p>
              <p>Ensure your clinical staff are documenting wound measurements and dressing justification at every visit to avoid retroactive claim denials during audits.</p>
            `,
            source: { label: 'Noridian LCD L33831 Revision', url: 'https://www.cms.gov/medicare-coverage-database/' },
            effective: 'March 15, 2026',
            unread: false,
          },
          {
            id: 'u4',
            date: '2026-01-30',
            tag: 'update',
            title: 'PDAC Coding Guidance Update: Collagen Wound Dressings',
            preview: 'PDAC has issued new guidance on coding collagen-based dressings under HCPCS A6021–A6024.',
            content: `
              <p>The Pricing, Data Analysis, and Coding (PDAC) contractor has issued updated guidance on the correct coding of collagen wound dressings under HCPCS codes A6021, A6022, A6023, and A6024.</p>
              <p>Products must now meet updated physical composition thresholds to qualify for the higher-payment collagen codes. Providers should verify that the products they are ordering have current PDAC coding verification letters on file.</p>
              <p>Wound Guard has confirmed PDAC coding compliance for all collagen products in our catalog. Product detail pages now display the PDAC verification status and effective date.</p>
            `,
            source: { label: 'PDAC Collagen Dressing Guidance Jan 2026', url: 'https://www.dmepdac.com' },
            effective: 'February 1, 2026',
            unread: false,
          },
          {
            id: 'u5',
            date: '2026-01-08',
            tag: 'new',
            title: '2026 ICD-10-CM Code Updates — Chronic Wound Diagnoses',
            preview: 'New ICD-10-CM codes for chronic wound conditions are effective for dates of service on or after January 1, 2026.',
            content: `
              <p>CMS has implemented the FY2026 ICD-10-CM code set, which includes several additions and revisions relevant to wound care providers.</p>
              <p>New codes include expanded specificity for pressure ulcer staging, additional laterality for diabetic foot ulcers, and new combination codes for wound infection with osteomyelitis. Deleted codes include several nonspecific ulcer categories replaced by more specific alternatives.</p>
              <p>Please ensure your EHR is updated with the new code set and that your clinical staff are using the most specific diagnosis codes available to support medical necessity for wound care supplies and services.</p>
            `,
            source: { label: 'CMS ICD-10-CM FY2026 Code Files', url: 'https://www.cms.gov/medicare/coding-billing/icd-10-codes' },
            effective: 'January 1, 2026',
            unread: false,
          },
          {
            id: 'u6',
            date: '2025-12-15',
            tag: 'update',
            title: 'CGS MAC: Updated Prepayment Review for Advanced Wound Care Products',
            preview: 'CGS Administrators has expanded its prepayment review probe to include additional advanced wound care HCPCS codes.',
            content: `
              <p>CGS Administrators (J15 MAC) has notified providers that it is expanding its prepayment review probe to include the following HCPCS codes: A6196, A6197, A6198 (alginate dressings), and select CTP codes in the Q4100 series.</p>
              <p>Claims selected for prepayment review will be placed on hold pending documentation review. Expected review timeframe is 30–45 days. Ensure that complete medical records, including wound care notes, physician orders, and certificates of medical necessity, are readily available for submission upon request.</p>
              <p>This review does not affect current orders — only claims submitted after December 20, 2025 will be subject to the expanded probe.</p>
            `,
            source: { label: 'CGS J15 MAC Prepayment Review Notice', url: 'https://www.cgsmedicare.com' },
            effective: 'December 20, 2025',
            unread: false,
          },
        ];

        // ─── Helpers ─────────────────────────────────
        function fmtDate(iso) {
          const d = new Date(iso + 'T12:00:00');
          return {
            month: d.toLocaleString('en-US', { month: 'short' }).toUpperCase(),
            day:   d.getDate(),
            year:  d.getFullYear(),
          };
        }
        function tagCls(tag) {
          return tag === 'alert' ? 'notif-item__tag--alert' : tag === 'new' ? 'notif-item__tag--new' : '';
        }
        function tagLbl(tag) {
          return tag === 'alert' ? '⚠ Alert' : tag === 'new' ? '★ New' : 'Update';
        }

        // ─── Build item element ───────────────────────
        function buildItem(u) {
          const { month, day, year } = fmtDate(u.date);
          const el = document.createElement('div');
          el.className = 'notif-item' + (u.unread ? ' is-unread' : '');
          el.dataset.id  = u.id;
          el.dataset.tag = u.tag;
          el.innerHTML = `
            <div class="notif-item__row" onclick="toggleItem('${u.id}')">
              <div class="notif-item__date">
                <span class="notif-item__date-month">${month}</span>
                <span class="notif-item__date-day">${day}</span>
                <span class="notif-item__date-year">${year}</span>
              </div>
              <span class="notif-item__tag ${tagCls(u.tag)}">${tagLbl(u.tag)}</span>
              <div class="notif-item__meta">
                <p class="notif-item__title">${u.title}</p>
                <p class="notif-item__preview">${u.preview}</p>
              </div>
              <span class="notif-item__dot" aria-hidden="true"></span>
              <span class="notif-item__chevron" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="6 9 12 15 18 9"/>
                </svg>
              </span>
            </div>
            <div class="notif-item__body" id="body-${u.id}">
              <div class="notif-item__body-header">
                <h2 class="notif-item__body-title">${u.title}</h2>
                ${u.unread
                  ? `<button class="notif-item__mark-read" id="mark-${u.id}" onclick="markRead('${u.id}', event)">Mark as read</button>`
                  : `<button class="notif-item__mark-read done" disabled>Read</button>`}
              </div>
              <div class="notif-item__body-content">${u.content}</div>
              <div class="notif-item__body-footer">
                ${u.source ? `<span class="notif-item__source">Source: <a href="${u.source.url}" target="_blank" rel="noopener">${u.source.label}</a></span>` : ''}
                <span class="notif-footer-spacer"></span>
                ${u.effective ? `
                  <span class="notif-item__effective">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                      <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
                      <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    Effective ${u.effective}
                  </span>` : ''}
              </div>
            </div>
          `;
          return el;
        }

        // ─── Render ───────────────────────────────────
        function renderAll(data) {
          const uList = document.getElementById('list-unread');
          const eList = document.getElementById('list-earlier');
          uList.innerHTML = ''; eList.innerHTML = '';

          const unread  = data.filter(u => u.unread);
          const earlier = data.filter(u => !u.unread);

          document.getElementById('section-unread').style.display  = unread.length  ? '' : 'none';
          document.getElementById('section-earlier').style.display = earlier.length ? '' : 'none';

          unread.forEach(u  => uList.appendChild(buildItem(u)));
          earlier.forEach(u => eList.appendChild(buildItem(u)));

          const totalShown  = data.length;
          const unreadCount = UPDATES.filter(u => u.unread).length;
          document.getElementById('notif-count').textContent        = totalShown;
          document.getElementById('notif-unread-count').textContent = unreadCount + ' unread';
        }

        // ─── Toggle accordion ─────────────────────────
        function toggleItem(id) {
          const el = document.querySelector(`.notif-item[data-id="${id}"]`);
          if (!el) return;
          const wasOpen = el.classList.contains('is-open');
          document.querySelectorAll('.notif-item.is-open').forEach(x => x.classList.remove('is-open'));
          if (!wasOpen) el.classList.add('is-open');
        }

        // ─── Mark as read ─────────────────────────────
        function markRead(id, event) {
          event.stopPropagation();
          const item = UPDATES.find(u => u.id === id);
          if (!item) return;
          item.unread = false;

          const el = document.querySelector(`.notif-item[data-id="${id}"]`);
          if (el) {
            el.classList.remove('is-unread');
            const btn = document.getElementById('mark-' + id);
            if (btn) { btn.textContent = 'Read'; btn.classList.add('done'); btn.disabled = true; }
          }

          const uList = document.getElementById('list-unread');
          const eList = document.getElementById('list-earlier');
          if (el && el.parentElement === uList) {
            uList.removeChild(el);
            eList.insertBefore(el, eList.firstChild);
          }
          if (!uList.children.length) document.getElementById('section-unread').style.display = 'none';
          document.getElementById('section-earlier').style.display = '';

          const unreadCount = UPDATES.filter(u => u.unread).length;
          document.getElementById('notif-unread-count').textContent = unreadCount + ' unread';
        }

        // ─── Filter ───────────────────────────────────
        function filterNotifs(type, btn) {
          document.querySelectorAll('.notif-filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');

          const data = type === 'unread' ? UPDATES.filter(u => u.unread)
                     : type === 'alert'  ? UPDATES.filter(u => u.tag === 'alert')
                     : UPDATES;

          renderAll(data);

          const labels = document.querySelectorAll('.notif-section-label');
          labels.forEach(l => l.style.display = type === 'all' ? '' : 'none');
        }

        // ─── Init ─────────────────────────────────────
        renderAll(UPDATES);
      </script>

    </div>

  </main>
