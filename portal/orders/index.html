<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Orders — Wound Guard</title>

  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>
  <link rel="stylesheet" href="../css/template.css" />

  <style>
    /* ── Orders page specific styles ── */

    .orders-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 48px;
      gap: 20px;
    }

    /* Top card — full width, centered */
    .orders-top {
      width: 100%;
      max-width: 560px;
    }

    /* Bottom two cards — side by side */
    .orders-bottom {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      width: 100%;
      max-width: 560px;
    }

    /* Shared card styles */
    .order-card {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 20px;
      padding: 28px 28px;
      background: var(--white);
      border: 2px solid #dde8ee;
      border-radius: 16px;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .order-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(6,23,40,0.10);
      border-color: var(--brand);
      background: #f6fef7;
    }

    .order-card:active { transform: translateY(-1px); }

    .order-card-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .order-card-icon svg {
      width: 24px;
      height: 24px;
      stroke: var(--brand);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .order-card-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .order-card-title {
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .order-card-count {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* Cancelled button — thin, red, pill shaped */
    .cancelled-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 28px;
      background: transparent;
      border: 2px solid #e53e3e;
      border-radius: 9999px;
      color: #e53e3e;
      font-family: 'Sora', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.18s ease, color 0.18s ease, transform 0.15s ease;
      margin-top: 8px;
    }

    .cancelled-btn:hover {
      background: #fee2e2;
      transform: translateY(-1px);
    }

    .cancelled-btn:active { transform: translateY(0); }

    .cancelled-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @media (max-width: 560px) {
      .orders-bottom { grid-template-columns: 1fr; }
      .orders-top, .orders-bottom { max-width: 100%; }
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Sora', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 4px;
      border-radius: 8px;
      margin-bottom: 20px;
      transition: color 0.15s ease, background 0.15s ease, padding 0.15s ease;
    }
.back-btn:hover {
  color: var(--brand);
  background: var(--accent);
  padding: 6px 10px;
}
  </style>
</head>
<body>

<!-- HEADER -->
<header class="portal-header" role="banner">
  <a href="/guard/portal/home/" class="header-logo" aria-label="Wound Guard Home">
    <div class="header-logo-mark">
      <svg viewBox="0 0 24 24">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
    </div>
    <div class="header-logo-text">Wound<br>Guard</div>
  </a>

  <div class="header-actions" role="navigation" aria-label="Header actions">
    <a href="/guard/portal/new-order/" class="header-btn header-btn-primary" aria-label="Place a new order">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      New Order
    </a>

    <a href="/guard/portal/organization/" class="header-btn header-btn-secondary" aria-label="View organization">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M9 21V9h6v12"/>
        <path d="M9 12h6"/>
      </svg>
      <span id="header-org-name">Organization</span>
    </a>

    <div class="header-divider" aria-hidden="true"></div>

    <a href="/guard/portal/account/" class="header-icon-btn" aria-label="Account Settings">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </a>

    <a href="/guard/portal/notifications/" class="header-icon-btn" aria-label="Notifications">
      <svg viewBox="0 0 24 24">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="notif-badge" id="notif-badge" aria-label="Unread notifications" style="display:none"></span>
    </a>
  </div>
</header>


<!-- BODY -->
<div class="portal-body">

  <!-- SIDEBAR -->
  <nav class="portal-sidebar" id="portal-sidebar" aria-label="Main navigation">
    <div class="sidebar-toggle-row">
      <button class="sidebar-toggle-btn" onclick="toggleSidebar()" aria-label="Toggle sidebar" title="Collapse / expand">
        <svg viewBox="0 0 24 24">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
    </div>

    <div class="sidebar-nav" role="list">
      <a href="/guard/portal/home/" class="sidebar-nav-item" data-page="home" data-label="Home" role="listitem" aria-label="Home">
        <span class="sidebar-nav-icon">
          <svg viewBox="0 0 24 24">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </span>
        <span class="sidebar-nav-label">Home</span>
      </a>

      <a href="/guard/portal/orders/" class="sidebar-nav-item active" data-page="orders" data-label="Orders" role="listitem" aria-label="Orders">
        <span class="sidebar-nav-icon">
          <svg viewBox="0 0 24 24">
            <line x1="8"  y1="6"  x2="21" y2="6"/>
            <line x1="8"  y1="12" x2="21" y2="12"/>
            <line x1="8"  y1="18" x2="21" y2="18"/>
            <line x1="3"  y1="6"  x2="3.01" y2="6"/>
            <line x1="3"  y1="12" x2="3.01" y2="12"/>
            <line x1="3"  y1="18" x2="3.01" y2="18"/>
          </svg>
        </span>
        <span class="sidebar-nav-label">Orders</span>
      </a>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="portal-content" id="portal-content">
    <div class="page-slot">

      <div class="orders-layout">

      <button onclick="goBack()" class="back-btn" aria-label="Go back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back
    </button>

        <!-- Top card — New Order -->
        <div class="orders-top">
          <a href="/guard/portal/new-order/" class="order-card">
            <div class="order-card-icon">
              <!-- Closed box icon -->
              <svg viewBox="0 0 24 24">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                <line x1="12" y1="22.08" x2="12" y2="12"/>
              </svg>
            </div>
            <div class="order-card-body">
              <div class="order-card-title">New Order</div>
            </div>
          </a>
        </div>

        <!-- Bottom two cards -->
        <div class="orders-bottom">

          <!-- Current / In-Process Orders -->
          <a href="/guard/portal/in-process-orders/" class="order-card">
            <div class="order-card-icon">
              <!-- Delivery truck icon -->
              <svg viewBox="0 0 24 24">
                <rect x="1" y="3" width="15" height="13" rx="1"/>
                <path d="M16 8h4l3 5v3h-7V8z"/>
                <circle cx="5.5" cy="18.5" r="2.5"/>
                <circle cx="18.5" cy="18.5" r="2.5"/>
              </svg>
            </div>
            <div class="order-card-body">
              <div class="order-card-title">In-Process Orders</div>
              <div class="order-card-count">([6]) in progress</div>
            </div>
          </a>

          <!-- Completed Orders -->
          <a href="/guard/portal/completed-orders/" class="order-card">
            <div class="order-card-icon">
              <!-- Open box icon -->
              <svg viewBox="0 0 24 24">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                <line x1="12" y1="22.08" x2="12" y2="12"/>
                <polyline points="9 9 12 6 15 9"/>
              </svg>
            </div>
            <div class="order-card-body">
              <div class="order-card-title">Completed Orders</div>
            </div>
          </a>

        </div>

        <!-- Cancelled Orders — small red pill button -->
        <a href="/guard/portal/cancelled-orders/" class="cancelled-btn">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <line x1="15" y1="9" x2="9" y2="15"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          Cancelled Orders
        </a>

      </div>

    </div>
  </main>

</div><!-- end .portal-body -->


<!-- FOOTER -->
<footer class="portal-footer" role="contentinfo">
  <nav class="footer-links" aria-label="Footer links">
    <a href="/guard/portal/privacy-policy/" class="footer-link">Privacy Policy</a>
    <a href="/guard/portal/contact/"        class="footer-link">Support Contact</a>
  </nav>
  <span class="footer-copy">© <span id="footer-year"></span> Wound Guard</span>
  <div class="footer-social">
    <a href="https://www.linkedin.com/company/wound-guard" class="footer-social-link" target="_blank" rel="noopener noreferrer" aria-label="Wound Guard on LinkedIn">
      <svg viewBox="0 0 24 24">
        <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
        <rect x="2" y="9" width="4" height="12"/>
        <circle cx="4" cy="4" r="2"/>
      </svg>
    </a>
  </div>
</footer>


<!-- SCRIPTS -->
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/template.js"></script>

<script>
  document.getElementById('footer-year').textContent = new Date().getFullYear();

  document.addEventListener('DOMContentLoaded', () => {
    initPortalPage();
  });

  function goBack() {
  if (window.history.length > 1) {
    window.history.back();
  } else {
    window.location.href = '/guard/portal/home/';
  }
  }

  // ── NOTE: Order counts ───────────────────────────
  // The numbers (3), (6), (7) in each card are
  // hardcoded placeholders. When AWS is connected,
  // replace them by calling your API endpoint and
  // updating the .order-card-count elements with
  // the real counts from DynamoDB.
</script>

</body>
</html>
