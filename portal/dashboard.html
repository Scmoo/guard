<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!--
    ╔══════════════════════════════════════════╗
    ║  WOUND GUARD — Portal Page Template      ║
    ║  Use this file as the starting point     ║
    ║  for every page (Home, Orders, etc.)     ║
    ║                                          ║
    ║  TO USE:                                 ║
    ║  1. Change <title> below                 ║
    ║  2. Set the active sidebar item          ║
    ║     (add class="active" to the right     ║
    ║      .sidebar-nav-item)                  ║
    ║  3. Drop your page content inside        ║
    ║     <main class="page-slot">             ║
    ║  4. That's it!                           ║
    ╚══════════════════════════════════════════╝
  -->

  <title>Page Name — Wound Guard</title>

  <!-- Auth0 SDK — must load before auth.js -->
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/template.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════
     HEADER
     ═══════════════════════════════════════════ -->
<header class="portal-header" role="banner">

  <!-- Logo (top-left) -->
  <a href="home.html" class="header-logo" aria-label="Wound Guard Home">
    <div class="header-logo-mark">
      <!-- Swap this SVG for your real logo image:
           <img src="images/logo.svg" alt="Wound Guard" width="22" height="22" />
      -->
      <svg viewBox="0 0 24 24">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
    </div>
    <div class="header-logo-text">Wound<br>Guard</div>
  </a>

  <!-- Right-side actions -->
  <div class="header-actions" role="navigation" aria-label="Header actions">

    <!-- Button 3: New Order -->
    <a href="new-order.html" class="header-btn header-btn-primary" aria-label="Place a new order">
      <!-- Plus icon -->
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      New Order
    </a>

    <!-- Button 4: Organization -->
    <a href="organization.html" class="header-btn header-btn-secondary" aria-label="View organization">
      <!-- Building icon -->
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 21V9h6v12"/><path d="M9 12h6"/>
      </svg>
      <!-- Org name filled in by template.js from Auth0 token -->
      <span id="header-org-name">Organization</span>
    </a>

    <!-- Divider -->
    <div class="header-divider" aria-hidden="true"></div>

    <!-- Icon 5a: Settings -->
    <a href="settings.html" class="header-icon-btn" aria-label="Organization settings">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </a>

    <!-- Icon 5b: Notifications -->
    <a href="notifications.html" class="header-icon-btn" aria-label="Notifications">
      <svg viewBox="0 0 24 24">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <!-- Green dot — shown when there are unread notifications -->
      <span class="notif-badge" id="notif-badge" aria-label="Unread notifications" style="display:none"></span>
    </a>

  </div>
</header>


<!-- ═══════════════════════════════════════════
     BODY — Sidebar + Content
     ═══════════════════════════════════════════ -->
<div class="portal-body">

  <!-- SIDEBAR (collapsible) -->
  <nav class="portal-sidebar" id="portal-sidebar" aria-label="Main navigation">

    <!-- Collapse toggle — the ">" arrow from the sketch -->
    <div class="sidebar-toggle-row">
      <button
        class="sidebar-toggle-btn"
        onclick="toggleSidebar()"
        aria-label="Toggle navigation"
        title="Collapse / expand sidebar"
      >
        <!-- Chevron left — JS rotates it when collapsed -->
        <svg viewBox="0 0 24 24">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
    </div>

    <!-- Nav items -->
    <div class="sidebar-nav" role="list">

      <!--
        data-page  = filename of the page this link goes to
                     template.js uses this to highlight the active item
        data-label = tooltip shown when sidebar is collapsed
        class="active" goes on whichever item is the current page
      -->

      <!-- Home -->
      <a
        href="home.html"
        class="sidebar-nav-item"
        data-page="home.html"
        data-label="Home"
        role="listitem"
        aria-label="Home"
      >
        <span class="sidebar-nav-icon">
          <svg viewBox="0 0 24 24">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </span>
        <span class="sidebar-nav-label">Home</span>
      </a>

      <!-- Orders -->
      <a
        href="orders.html"
        class="sidebar-nav-item"
        data-page="orders.html"
        data-label="Orders"
        role="listitem"
        aria-label="Orders"
      >
        <span class="sidebar-nav-icon">
          <svg viewBox="0 0 24 24">
            <line x1="8" y1="6" x2="21" y2="6"/>
            <line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6"/>
            <line x1="3" y1="12" x2="3.01" y2="12"/>
            <line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
        </span>
        <span class="sidebar-nav-label">Orders</span>
      </a>

      <!--
        ─────────────────────────────────────────
        ADD MORE NAV ITEMS HERE if needed later.
        Copy one of the blocks above and change:
          href, data-page, data-label, aria-label,
          the SVG icon, and the label text.
        ─────────────────────────────────────────
      -->

    </div>
  </nav>

  <!-- MAIN CONTENT AREA -->
  <main class="portal-content" id="portal-content">

    <!--
      ╔══════════════════════════════════════════╗
      ║  DROP YOUR PAGE CONTENT HERE             ║
      ║                                          ║
      ║  Everything inside .page-slot is         ║
      ║  unique to each page. The header,        ║
      ║  sidebar, and footer stay the same.      ║
      ╚══════════════════════════════════════════╝
    -->
    <div class="page-slot">

      <!-- EXAMPLE content — replace with your actual page -->
      <p style="color:var(--text-muted);font-size:0.9rem;margin-top:40px;text-align:center;opacity:0.5">
        ↑ Your page content goes here ↑
      </p>

    </div>

  </main>

</div><!-- end .portal-body -->


<!-- ═══════════════════════════════════════════
     FOOTER
     ═══════════════════════════════════════════ -->
<footer class="portal-footer" role="contentinfo">

  <!-- Left: text links -->
  <nav class="footer-links" aria-label="Footer links">
    <a href="privacy-policy.html" class="footer-link">Privacy Policy</a>
    <a href="support.html"        class="footer-link">Support Contact</a>
  </nav>

  <!-- Center: copyright (optional) -->
  <span class="footer-copy">© <span id="footer-year"></span> Wound Guard</span>

  <!-- Right: social icon(s) -->
  <div class="footer-social">
    <a
      href="https://linkedin.com/company/YOUR-COMPANY"
      class="footer-social-link"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Wound Guard on LinkedIn"
    >
      <!-- LinkedIn SVG icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
        <rect x="2" y="9" width="4" height="12"/>
        <circle cx="4" cy="4" r="2"/>
      </svg>
    </a>
  </div>

</footer>


<!-- ═══════════════════════════════════════════
     SCRIPTS
     Load order matters:
       1. auth.js   — Auth0 helpers (requireAuth, logout, etc.)
       2. api.js    — AWS data fetching helpers
       3. template.js — sidebar, guard, user hydration
     ═══════════════════════════════════════════ -->
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/template.js"></script>

<script>
  // Auto-fill copyright year
  document.getElementById('footer-year').textContent = new Date().getFullYear();

  // ── REQUIRED on every page ──
  // Checks Auth0 login, fills in org name, enforces roles.
  // If the user isn't logged in, they're redirected to login.html.
  document.addEventListener('DOMContentLoaded', () => {
    initPortalPage();
  });
</script>

</body>
</html>
