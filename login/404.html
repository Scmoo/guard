<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Client Ordering Portal</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .not-found { text-align:center; max-width:400px; padding: 40px 24px; }
    .not-found-code { font-family:'Krona One',sans-serif; font-size:6rem; color:var(--accent-dark); line-height:1; }
    .not-found h2   { font-size:1.4rem; color:var(--text); margin:12px 0 8px; }
    .not-found p    { font-size:0.875rem; color:var(--text-muted); margin-bottom:28px; }
  </style>
</head>
<body>
  <div class="not-found">
    <div class="not-found-code">404</div>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or you don't have permission to view it.</p>
    <a href="../login.html" class="btn btn-primary">Return to Login</a>
    &nbsp;
    <a href="dashboard.html" class="btn btn-secondary">Go to Dashboard</a>
  </div>
</body>
</html>
